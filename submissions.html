<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WH2 Submission Review</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{margin:0;background:#000;color:white;font-family:Arial,sans-serif;}
.header{text-align:center;padding:30px 20px;background:linear-gradient(to bottom,#300000,#000);border-bottom:1px solid red;}
.logo{font-size:70px;font-weight:900;text-shadow:0 0 22px red;}
.logo span{color:red;}
.subtitle{color:#ccc;margin-top:8px;}
.container{width:92%;max-width:1000px;margin:30px auto;}
.card{background:#111;border:1px solid red;border-radius:22px;padding:22px;margin-bottom:18px;box-shadow:0 0 20px rgba(255,0,0,.2);}
h2{color:red;margin-top:0;}
p{color:#ccc;line-height:1.5;}
button{width:100%;padding:13px;margin-top:10px;background:red;color:white;border:none;border-radius:50px;font-weight:bold;}
.reject{background:#555;}
.loading{text-align:center;padding:60px 20px;color:#ccc;font-size:20px;}
.status{color:#66ff99;font-weight:bold;}
a{color:red;}
</style>
</head>

<body>

<div id="loading" class="loading">Checking owner access...</div>

<div id="pageContent" style="display:none;">

<div class="header">
<div class="logo">WH<span>2</span></div>
<div class="subtitle">Submission Review Queue</div>
</div>

<div class="container">
<button onclick="location.href='admin.html'">BACK TO DASHBOARD</button>
<div id="submissionsList">Loading submissions...</div>
</div>

</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDDpYf4GtbcIZ0OBu13qYqFqUt6H0s1C24",
authDomain: "wh2-radio.firebaseapp.com",
projectId: "wh2-radio",
storageBucket: "wh2-radio.firebasestorage.app",
messagingSenderId: "172232120211",
appId: "1:172232120211:web:69a549acd85f286c5f3a66"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

firebase.auth().onAuthStateChanged(function(user){
if(user && user.email.toLowerCase()==="wehumanradio@gmail.com"){
document.getElementById("loading").style.display="none";
document.getElementById("pageContent").style.display="block";
loadSubmissions();
}else{
window.location.href="login.html";
}
});

function loadSubmissions(){
const list=document.getElementById("submissionsList");
list.innerHTML="Loading submissions...";

db.collection("submissions").orderBy("createdAt","desc").get()
.then(function(snapshot){
if(snapshot.empty){
list.innerHTML="<p>No submissions yet.</p>";
return;
}

list.innerHTML="";

snapshot.forEach(function(doc){
const data=doc.data();

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<h2>${data.songTitle || "Untitled Song"}</h2>
<p><strong>Artist / Creator:</strong> ${data.artistName || ""}</p>
<p><strong>Email:</strong> ${data.email || ""}</p>
<p><strong>Submission Type:</strong> ${data.submissionType || ""}</p>
<p><strong>Genre:</strong> ${data.genre || ""}</p>
<p><strong>AI Tool:</strong> ${data.aiTool || "Not provided"}</p>
<p><strong>Artist Link:</strong> ${data.artistLink ? `<a href="${data.artistLink}" target="_blank">Open Artist Link</a>` : "Not provided"}</p>
<p><strong>Song Link:</strong> ${data.songLink ? `<a href="${data.songLink}" target="_blank">Open Song Link</a>` : "Not provided"}</p>
<p><strong>Cover Link:</strong> ${data.coverLink ? `<a href="${data.coverLink}" target="_blank">Open Cover Link</a>` : "Not provided"}</p>
<p><strong>Notes:</strong> ${data.notes || "None"}</p>
<p><strong>Status:</strong> <span class="status">${data.status || "Pending Review"}</span></p>
<button onclick="approveSubmission('${doc.id}')">APPROVE + ADD TO LIBRARY</button>
<button class="reject" onclick="rejectSubmission('${doc.id}')">REJECT SUBMISSION</button>
`;

list.appendChild(card);
});
});
}

function approveSubmission(id){
db.collection("submissions").doc(id).get()
.then(function(doc){
if(doc.exists){
const data=doc.data();

db.collection("approvedSongs").add({
artistName:data.artistName || "",
creatorName:data.artistName || "",
email:data.email || "",
songTitle:data.songTitle || "",
submissionType:data.submissionType || "",
genre:data.genre || "",
aiTool:data.aiTool || "",
artistLink:data.artistLink || "",
songLink:data.songLink || "",
coverLink:data.coverLink || "",
notes:data.notes || "",
status:"Approved",
sourceSubmissionId:id,
addedAt:firebase.firestore.FieldValue.serverTimestamp()
}).then(function(){
db.collection("submissions").doc(id).update({
status:"Approved - Added to Library"
}).then(function(){
loadSubmissions();
});
});
}
});
}

function rejectSubmission(id){
db.collection("submissions").doc(id).update({
status:"Rejected"
}).then(function(){
loadSubmissions();
});
}
</script>

</body>
</html>
