<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WH2 Owner Login</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.login-box{
width:90%;
max-width:450px;
background:#111;
border:1px solid red;
border-radius:25px;
padding:30px;
text-align:center;
}

.logo{
font-size:60px;
font-weight:900;
margin-bottom:20px;
}

.logo span{
color:red;
}

input{
width:90%;
padding:15px;
margin:10px 0;
background:#000;
border:1px solid red;
border-radius:10px;
color:white;
}

button{
width:95%;
padding:15px;
margin-top:15px;
border:none;
border-radius:50px;
background:red;
color:white;
font-weight:bold;
cursor:pointer;
}

#errorBox{
margin-top:15px;
color:#ff6666;
}
</style>
</head>
<body>

<div class="login-box">

<div class="logo">WH<span>2</span></div>

<h2>Owner Login</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="loginOwner()">LOGIN</button>

<div id="errorBox"></div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDDpYf4GtbcIZ0OBu13qYqFqUt6H0s1C24",
authDomain: "wh2-radio.firebaseapp.com",
projectId: "wh2-radio",
storageBucket: "wh2-radio.firebasestorage.app",
messagingSenderId: "172232120211",
appId: "1:172232120211:web:69a549acd85f286c5f3a66"
};

firebase.initializeApp(firebaseConfig);

function loginOwner(){

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value;

firebase.auth()
.signInWithEmailAndPassword(email,password)

.then(function(userCredential){

const userEmail =
userCredential.user.email.toLowerCase();

if(userEmail === "wehumanradio@gmail.com"){

window.location.href = "admin.html";

}else{

firebase.auth().signOut();

document.getElementById("errorBox").innerText =
"Unauthorized account.";

}

})

.catch(function(error){

document.getElementById("errorBox").innerText =
error.message;

});

}

</script>

</body>
</html>
