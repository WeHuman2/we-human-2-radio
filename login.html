<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WH2 Owner Login</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
body{
margin:0;
min-height:100vh;
background:radial-gradient(circle at top,#2b0000 0%,#000 45%,#000 100%);
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.login-box{
width:90%;
max-width:400px;
padding:30px;
background:#111;
border:1px solid red;
border-radius:25px;
text-align:center;
box-shadow:0 0 30px rgba(255,0,0,.4);
}

.logo{
font-size:60px;
font-weight:900;
margin-bottom:15px;
}

.logo span{
color:red;
}

input{
width:90%;
padding:15px;
margin:10px 0;
background:black;
border:1px solid red;
border-radius:10px;
color:white;
font-size:16px;
}

button{
width:95%;
padding:15px;
margin-top:15px;
border:none;
border-radius:50px;
background:red;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

#error{
margin-top:15px;
color:#ff6b6b;
font-size:14px;
}

.footer{
margin-top:20px;
font-size:12px;
color:#888;
}
</style>
</head>

<body>

<div class="login-box">

<div class="logo">WH<span>2</span></div>

<h2>Owner Login</h2>

<p>Private access for WH2 Radio management.</p>

<input id="email" type="email" placeholder="Owner Email">

<input id="password" type="password" placeholder="Password">

<button onclick="loginOwner()">LOGIN</button>

<div id="error"></div>

<div class="footer">
WH2 Radio Admin Access
</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDDpYf4GtbcIZ00Bu13qYqFqUt6H0s1C24",
authDomain: "wh2-radio.firebaseapp.com",
projectId: "wh2-radio",
storageBucket: "wh2-radio.firebasestorage.app",
messagingSenderId: "172232102011",
appId: "1:172232102011:web:69a549acd85f286c5f3a66"
};

firebase.initializeApp(firebaseConfig);

function loginOwner(){

const email =
document.getElementById("email").value.trim().toLowerCase();

const password =
document.getElementById("password").value;

const errorBox =
document.getElementById("error");

errorBox.innerText = "Checking login...";

firebase.auth()
.signInWithEmailAndPassword(email,password)

.then(function(userCredential){

const userEmail =
userCredential.user.email.toLowerCase();

if(userEmail === "wehumanradio@gmail.com"){

window.location.href = "admin.html";

}else{

firebase.auth().signOut();

errorBox.innerText =
"Access denied. Owner account only.";

}

})

.catch(function(error){

errorBox.innerText =
error.code + " | " + error.message;

});

}

</script>

</body>
</html>
