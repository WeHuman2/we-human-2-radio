<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WH2 Owner Login</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#2b0000 0%,#000 45%,#000 100%);
font-family:Arial,sans-serif;
color:white;
}

.login-box{
width:90%;
max-width:500px;
background:#0d0d0d;
border:1px solid red;
border-radius:30px;
padding:40px;
text-align:center;
box-shadow:0 0 30px rgba(255,0,0,.35);
}

.logo{
font-size:72px;
font-weight:900;
text-shadow:0 0 20px red;
margin-bottom:20px;
}

.logo span{
color:red;
}

h2{
margin-bottom:10px;
}

p{
color:#ccc;
margin-bottom:30px;
}

input{
width:100%;
padding:16px;
margin-bottom:20px;
background:black;
border:1px solid red;
border-radius:14px;
color:white;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:40px;
background:red;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

#errorBox{
margin-top:15px;
color:#ff6666;
font-size:14px;
}

.footer{
margin-top:20px;
color:#666;
font-size:13px;
}
</style>
</head>

<body>

<div class="login-box">

<div class="logo">WH<span>2</span></div>

<h2>Owner Login</h2>

<p>Private access for WH2 Radio management.</p>

<input
type="email"
id="email"
placeholder="Owner Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="loginOwner()">
LOGIN
</button>

<div id="errorBox"></div>

<div class="footer">
WH2 Radio Admin Access
</div>

</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDDpYf4GtbcIZ0OBu13qYqFqUt6H0s1C24",
authDomain: "wh2-radio.firebaseapp.com",
projectId: "wh2-radio",
storageBucket: "wh2-radio.firebasestorage.app",
messagingSenderId: "172232120211",
appId: "1:172232120211:web:69a549acd85f286c5f3a66"
};

firebase.initializeApp(firebaseConfig);

function loginOwner(){

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value;

const errorBox =
document.getElementById("errorBox");

errorBox.innerText = "";

firebase.auth()
.signInWithEmailAndPassword(email,password)

.then(function(userCredential){

const user = userCredential.user;

if(user.email.toLowerCase() === "wehumanradio@gmail.com"){

window.location.href = "admin.html";

}else{

firebase.auth().signOut();

errorBox.innerText =
"Unauthorized account.";

}

})

.catch(function(error){

errorBox.innerText = error.message;

});

}
</script>

</body>
</html>
