<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WH2 Owner Login</title>

<style>
body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#2b0000 0%,#000 45%,#000 100%);
  color:white;
  font-family:Arial,sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.login-box{
  width:90%;
  max-width:390px;
  padding:30px;
  background:rgba(20,20,20,.95);
  border:1px solid red;
  border-radius:25px;
  box-shadow:0 0 35px rgba(255,0,0,.35);
}

.logo{
  font-size:52px;
  font-weight:900;
  color:white;
  text-shadow:0 0 18px red;
}

.logo span{
  color:red;
}

p{
  color:#ccc;
}

input{
  width:90%;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid red;
  background:#000;
  color:white;
  font-size:15px;
}

button{
  width:95%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:50px;
  background:red;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.small{
  margin-top:18px;
  font-size:13px;
  color:#777;
}
</style>
</head>

<body>

<div class="login-box">
  <div class="logo">WH<span>2</span></div>
  <h2>Owner Login</h2>
  <p>Private access for WH2 Radio management.</p>

  <input type="email" placeholder="Owner Email">
  <input type="password" placeholder="Password">

  <button>LOGIN</button>

  <div class="small">WH2 Radio Admin Access</div>
</div>

</body>
</html>
