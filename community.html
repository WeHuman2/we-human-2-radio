<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WH2 Community Wall</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{margin:0;background:#000;color:white;font-family:Arial,sans-serif;}
.header{text-align:center;padding:35px 20px;background:linear-gradient(to bottom,#2b0000,#000);border-bottom:1px solid red;}
.logo{font-size:60px;font-weight:900;text-shadow:0 0 18px red;}
.logo span{color:red;}
.container{width:90%;max-width:800px;margin:35px auto;background:#111;border:1px solid red;border-radius:25px;padding:25px;}
h1,h2{color:red;text-align:center;}
p{color:#ccc;line-height:1.5;}
input,textarea{width:95%;padding:14px;margin:10px 0;background:#000;color:white;border:1px solid red;border-radius:12px;font-size:15px;}
button{width:100%;padding:14px;margin-top:12px;background:red;color:white;border:none;border-radius:50px;font-weight:bold;}
.message{margin-top:15px;text-align:center;color:#66ff99;}
.comment{border-top:1px solid rgba(255,0,0,.5);padding:18px 0;}
.comment-name{color:red;font-weight:bold;}
.comment-text{color:#ddd;margin-top:6px;}
.small{color:#888;font-size:12px;margin-top:6px;}
a{color:red;}
</style>
</head>

<body>

<div class="header">
<div class="logo">WH<span>2</span></div>
<h1>Community Wall</h1>
<p>Leave a shoutout, show love, or support independent music.</p>
</div>

<div class="container">

<h2>Post a Message</h2>

<input id="nameInput" type="text" placeholder="Your Name">
<textarea id="commentInput" rows="4" placeholder="Write your message"></textarea>

<button onclick="postComment()">POST MESSAGE</button>

<div class="message" id="messageBox"></div>

<p style="text-align:center;margin-top:25px;">
<a href="index.html">Back to WH2 Radio</a>
</p>

</div>

<div class="container">

<h2>Latest Messages</h2>

<div id="commentsList">Loading messages...</div>

</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDDpYf4GtbcIZ0OBu13qYqFqUt6H0s1C24",
authDomain: "wh2-radio.firebaseapp.com",
projectId: "wh2-radio",
storageBucket: "wh2-radio.firebasestorage.app",
messagingSenderId: "172232120211",
appId: "1:172232120211:web:69a549acd85f286c5f3a66"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function postComment(){
const name = document.getElementById("nameInput").value.trim();
const comment = document.getElementById("commentInput").value.trim();
const messageBox = document.getElementById("messageBox");

if(!name || !comment){
messageBox.style.color = "#ff7777";
messageBox.innerText = "Please enter your name and message.";
return;
}

db.collection("communityComments").add({
name:name,
comment:comment,
status:"Visible",
createdAt:firebase.firestore.FieldValue.serverTimestamp()
}).then(function(){
messageBox.style.color = "#66ff99";
messageBox.innerText = "Message posted.";
document.getElementById("nameInput").value = "";
document.getElementById("commentInput").value = "";
});
}

db.collection("communityComments").orderBy("createdAt","desc").limit(25)
.onSnapshot(function(snapshot){
const list = document.getElementById("commentsList");

if(snapshot.empty){
list.innerHTML = "<p>No messages yet. Be the first to post.</p>";
return;
}

list.innerHTML = "";

snapshot.forEach(function(doc){
const data = doc.data();

if(data.status !== "Visible"){
return;
}

const div = document.createElement("div");
div.className = "comment";

div.innerHTML = `
<div class="comment-name">${data.name || "Listener"}</div>
<div class="comment-text">${data.comment || ""}</div>
<div class="small">WH2 Community</div>
`;

list.appendChild(div);
});
});
</script>

</body>
</html>
