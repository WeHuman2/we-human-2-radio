<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WH2 Radio</title>

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial,sans-serif;
text-align:center;
}

.header{
padding:40px 20px;
background:linear-gradient(to bottom,#2b0000,#000);
border-bottom:1px solid red;
}

.logo{
font-size:64px;
font-weight:900;
color:white;
text-shadow:0 0 15px red;
}

.logo span{
color:red;
}

.tagline{
font-size:20px;
margin-top:10px;
color:#ccc;
}

.login-btn{
display:inline-block;
margin-top:25px;
padding:12px 30px;
background:red;
color:white;
text-decoration:none;
border-radius:40px;
font-weight:bold;
}

.player-card{
width:90%;
max-width:500px;
margin:40px auto;
padding:25px;
background:#111;
border:1px solid red;
border-radius:25px;
box-shadow:0 0 25px rgba(255,0,0,.3);
}

.album-art{
width:100%;
max-width:300px;
border-radius:20px;
border:3px solid red;
}

.song-title{
font-size:32px;
font-weight:bold;
margin-top:20px;
}

.artist{
font-size:18px;
color:#aaa;
margin-bottom:20px;
}

audio{
width:100%;
}

.footer{
padding:30px;
color:#777;
font-size:13px;
}

</style>
</head>

<body>

<div class="header">

<div class="logo">
WH<span>2</span>
</div>

<div class="tagline">
AI Curated. Human Approved.
</div>

<a class="login-btn" href="login.html">
OWNER LOGIN
</a>

</div>

<div class="player-card">

<img src="WH2 Logo pics.png" class="album-art">

<div class="song-title">
Midnight Vibes
</div>

<div class="artist">
WH2 Artist
</div>

<audio controls>
<source src="rockot-experimental-cinematic-hip-hop-315904.mp3" type="audio/mpeg">
</audio>

</div>

<div class="footer">
WH2 Radio © 2026
</div>

</body>
</html>
