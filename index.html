<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WH2 Radio</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff0000">
<link rel="apple-touch-icon" href="WH2 Logo pics.png">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{margin:0;background:#000;color:white;font-family:Arial,sans-serif;text-align:center;}
.header{padding:40px 20px;background:linear-gradient(to bottom,#2b0000,#000);border-bottom:1px solid red;}
.logo{font-size:64px;font-weight:900;color:white;text-shadow:0 0 15px red;}
.logo span{color:red;}
.tagline{font-size:20px;margin-top:10px;color:#ccc;}
.player-card{width:90%;max-width:500px;margin:40px auto;padding:25px;background:#111;border:1px solid red;border-radius:25px;box-shadow:0 0 25px rgba(255,0,0,.3);}
.album-art{width:100%;max-width:300px;border-radius:20px;border:3px solid red;}
.live-badge{display:inline-block;margin-top:22px;padding:7px 16px;border-radius:50px;background:red;font-size:13px;font-weight:bold;}
.song-title{font-size:32px;font-weight:bold;margin-top:20px;}
.artist{font-size:18px;color:#aaa;margin-bottom:20px;}
audio{width:100%;}
.offline-box{display:none;width:90%;max-width:500px;margin:40px auto;padding:35px 25px;background:#111;border:1px solid red;border-radius:25px;box-shadow:0 0 25px rgba(255,0,0,.25);}
.offline-box h2{color:red;margin-top:0;}
.footer{padding:30px;color:#777;font-size:13px;}
.owner-link{font-size:12px;color:#333;text-decoration:none;}
</style>
</head>

<body>

<div class="header">
<div class="logo">WH<span>2</span></div>
<div class="tagline">AI Curated. Human Approved.</div>
</div>

<div class="player-card" id="playerCard">

<img src="WH2 Logo pics.png" class="album-art">

<div class="live-badge">NOW STREAMING</div>

<div class="song-title" id="songTitle">Loading...</div>
<div class="artist" id="artistName">Loading...</div>

<audio controls>
<source src="rockot-experimental-cinematic-hip-hop-315904.mp3" type="audio/mpeg">
</audio>

</div>

<div class="offline-box" id="offlineBox">
<h2>WH2 Radio is temporarily offline.</h2>
<p>Please check back later for the next sound.</p>
</div>

<div class="footer">
WH2 Radio © 2026<br><br>
<a class="owner-link" href="login.html">Owner Access</a>
</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDDpYf4GtbcIZ0OBu13qYqFqUt6H0s1C24",
authDomain: "wh2-radio.firebaseapp.com",
projectId: "wh2-radio",
storageBucket: "wh2-radio.firebasestorage.app",
messagingSenderId: "172232120211",
appId: "1:172232120211:web:69a549acd85f286c5f3a66"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const radioRef = db.collection("settings").doc("radio");

radioRef.onSnapshot(function(doc){
if(doc.exists){
const data = doc.data();

document.getElementById("songTitle").innerText = data.currentSong || "WH2 Radio";
document.getElementById("artistName").innerText = data.currentArtist || "WH2 Artist";

if(data.isLive === true){
document.getElementById("playerCard").style.display = "block";
document.getElementById("offlineBox").style.display = "none";
}else{
document.getElementById("playerCard").style.display = "none";
document.getElementById("offlineBox").style.display = "block";
}
}
});

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
