<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WH2 Radio</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff0000">
<link rel="apple-touch-icon" href="WH2 Logo pics.png">

<style>
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top, #2b0000 0%, #000 45%, #000 100%);
  color:white;
  font-family:Arial, sans-serif;
  text-align:center;
}

.header{
  padding:35px 20px 25px;
}

.logo{
  font-size:58px;
  font-weight:900;
  letter-spacing:2px;
  color:white;
  text-shadow:0 0 18px red;
}

.logo span{
  color:red;
}

.tagline{
  color:#ddd;
  font-size:18px;
  margin-top:8px;
  letter-spacing:1px;
}

.player-card{
  width:90%;
  max-width:430px;
  margin:35px auto;
  padding:25px;
  background:rgba(20,20,20,.92);
  border:1px solid rgba(255,0,0,.7);
  border-radius:28px;
  box-shadow:0 0 35px rgba(255,0,0,.35);
}

.album-art{
  width:100%;
  max-width:310px;
  height:310px;
  border-radius:24px;
  object-fit:cover;
  border:3px solid red;
  box-shadow:0 0 25px rgba(255,0,0,.55);
}

.live-badge{
  display:inline-block;
  margin-top:22px;
  padding:7px 16px;
  border-radius:50px;
  background:red;
  color:white;
  font-weight:bold;
  font-size:13px;
  letter-spacing:2px;
}

.song-title{
  font-size:32px;
  font-weight:800;
  margin-top:18px;
}

.artist{
  font-size:17px;
  color:#aaa;
  margin-top:5px;
}

.wave{
  margin:25px auto 15px;
  width:90%;
  height:45px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:5px;
}

.wave span{
  display:block;
  width:5px;
  height:20px;
  background:red;
  border-radius:10px;
  animation:pulse 1s infinite ease-in-out;
}

.wave span:nth-child(2){animation-delay:.1s;height:28px;}
.wave span:nth-child(3){animation-delay:.2s;height:38px;}
.wave span:nth-child(4){animation-delay:.3s;height:25px;}
.wave span:nth-child(5){animation-delay:.4s;height:42px;}
.wave span:nth-child(6){animation-delay:.5s;height:30px;}
.wave span:nth-child(7){animation-delay:.6s;height:22px;}

@keyframes pulse{
  0%,100%{transform:scaleY(.5);opacity:.5;}
  50%{transform:scaleY(1.4);opacity:1;}
}

audio{
  width:100%;
  margin-top:10px;
}

.buttons{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:22px;
}

.button{
  padding:12px 16px;
  border-radius:50px;
  border:1px solid red;
  color:white;
  font-size:13px;
  letter-spacing:1px;
}

.footer{
  padding:25px;
  color:#777;
  font-size:13px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">WH<span>2</span></div>
  <div class="tagline">AI Curated. Human Approved.</div>
</div>

<div class="player-card">

  <img class="album-art" src="WH2 Logo pics.png">

  <div class="live-badge">NOW STREAMING</div>

  <div class="song-title">Midnight Vibes</div>
  <div class="artist">WH2 Artist</div>

  <div class="wave">
    <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <audio controls>
    <source src="rockot-experimental-cinematic-hip-hop-315904.mp3" type="audio/mpeg">
  </audio>

  <div class="buttons">
    <div class="button">AI RADIO</div>
    <div class="button">MUSIC</div>
    <div class="button">STREAMING</div>
  </div>

</div>

<div class="footer">
  WH2 Radio © 2026 • Built for the next sound
</div>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
