<!DOCTYPE html>
<html>
<head>
  <title>We Human 2 Radio</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px auto;
      border-radius: 12px;
      max-width: 500px;
    }

    input, textarea {
      padding: 8px;
      margin: 5px;
      border-radius: 6px;
      border: none;
      width: 90%;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      cursor: pointer;
      margin-top: 10px;
    }

    .artist {
      margin: 15px 0;
      cursor: pointer;
    }

    label {
      display: block;
      margin: 5px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>🎧 We Human 2 Radio</h1>

<!-- PLAYER -->
<div class="card">
  <h2>Now Playing</h2>
  <p id="track">AI Artist - Future Sound</p>

  <audio id="player" controls>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
  </audio>
</div>

<!-- UPLOAD SYSTEM -->
<div class="card">
  <h2>⬆️ Upload Artist Track</h2>

  <input id="artistName" placeholder="Artist Name"><br>
  <input id="trackName" placeholder="Track Title"><br>

  <input type="file" id="audioFile" accept="audio/*"><br>

  <textarea id="humanContribution" placeholder="Describe your human contribution (required)"></textarea>

  <label>
    <input type="checkbox" id="terms"> I agree to Terms of Service
  </label>

  <label>
    <input type="checkbox" id="noSamples"> I confirm no unlicensed samples
  </label>

  <button onclick="uploadTrack()">Submit Track</button>
</div>

<!-- ARTISTS -->
<div class="card">
  <h2>🎤 Artists</h2>
  <div id="artistList"></div>
</div>

<script>
let artists = [
  {
    name: "AI Artist",
    track: "Future Sound",
    url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
  },
  {
    name: "NeuroBeats",
    track: "Digital Dreams",
    url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
  },
  {
    name: "EchoSynth",
    track: "Night Pulse",
    url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
  }
];

function renderArtists(){
  let output = "";

  artists.forEach(a => {
    output += `
      <div class="artist" onclick="playTrack('${a.name} - ${a.track}', '${a.url}')">
        <strong>${a.name}</strong><br>
        ${a.track}<br>
        <button>Play</button>
      </div>
    `;
  });

  document.getElementById("artistList").innerHTML = output;
}

function uploadTrack(){
  let name = document.getElementById("artistName").value;
  let track = document.getElementById("trackName").value;
  let contribution = document.getElementById("humanContribution").value;
  let terms = document.getElementById("terms").checked;
  let noSamples = document.getElementById("noSamples").checked;
  let fileInput = document.getElementById("audioFile");

  // VALIDATION
  if(!terms){
    alert("You must accept Terms of Service");
    return;
  }

  if(!noSamples){
    alert("You must confirm no unlicensed samples");
    return;
  }

  if(!contribution.trim()){
    alert("Human contribution is required");
    return;
  }

  if(!name || !track){
    alert("Artist and track required");
    return;
  }

  if(fileInput.files.length === 0){
    alert("You must upload an audio file");
    return;
  }

  // SEND TO BACKEND
  const formData = new FormData();
  formData.append("audio", fileInput.files[0]);
  formData.append("artistName", name);
  formData.append("trackName", track);
  formData.append("humanContribution", contribution);

  fetch("http://localhost:3000/upload", {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);

    // STILL SHOW LOCALLY
    let fileURL = URL.createObjectURL(fileInput.files[0]);

    artists.push({
      name: name,
      track: track,
      url: fileURL
    });

    renderArtists();

    // CLEAR FORM
    document.getElementById("artistName").value = "";
    document.getElementById("trackName").value = "";
    document.getElementById("humanContribution").value = "";
    document.getElementById("terms").checked = false;
    document.getElementById("noSamples").checked = false;
    fileInput.value = "";
  })
  .catch(err => {
    alert("Upload failed (check console)");
    console.error(err);
  });
}

function playTrack(name, url){
  document.getElementById("track").innerText = name;

  let player = document.getElementById("player");

  if(url){
    player.src = url;
  }

  player.pause();
  player.currentTime = 0;
  player.play();
}

renderArtists();
</script>

</body>
</html>
