<!DOCTYPE html>
<html>
<head>
  <title>We Human 2 Radio</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px auto;
      border-radius: 12px;
      max-width: 500px;
    }

    input {
      padding: 8px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      cursor: pointer;
    }

    .artist {
      margin: 15px 0;
    }
  </style>
</head>

<body>

<h1>🎧 We Human 2 Radio</h1>

<!-- PLAYER -->
<div class="card">
  <h2>Now Playing</h2>
  <p id="track">AI Artist - Future Sound</p>

  <audio id="player" controls>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
  </audio>
</div>

<!-- UPLOAD UI -->
<div class="card">
  <h2>➕ Add Artist</h2>

  <input id="artistName" placeholder="Artist Name"><br>
  <input id="trackName" placeholder="Track Name"><br>

  <button onclick="addArtist()">Add Artist</button>
</div>

<!-- ARTISTS -->
<div class="card">
  <h2>🎤 Artists</h2>
  <div id="artistList"></div>
</div>

<script>
let artists = [
  {name: "AI Artist", track: "Future Sound"},
  {name: "NeuroBeats", track: "Digital Dreams"},
  {name: "EchoSynth", track: "Night Pulse"}
];

function renderArtists(){
  let output = "";

  artists.forEach(a => {
    output += `
      <div class="artist" onclick="playTrack('${a.name} - ${a.track}')">
        <strong>${a.name}</strong><br>
        ${a.track}<br>
        <button>Play</button>
      </div>
    `;
  });

  document.getElementById("artistList").innerHTML = output;
}

function addArtist(){
  let name = document.getElementById("artistName").value;
  let track = document.getElementById("trackName").value;

  if(!name || !track){
    alert("Enter artist and track");
    return;
  }

  artists.push({name, track});
  renderArtists();

  document.getElementById("artistName").value = "";
  document.getElementById("trackName").value = "";
}

function playTrack(name){
  document.getElementById("track").innerText = name;

  let player = document.getElementById("player");
  player.pause();
  player.currentTime = 0;
  player.play();
}

renderArtists();
</script>

</body>
</html>
