<!DOCTYPE html>
<html>
<head>
  <title>We Human 2 Radio</title>
</head>
<body>

  <h1>We Human 2 Radio 🎧</h1>

  <h2>Now Playing</h2>
  <p id="track">AI Artist - Future Sound</p>
  <p id="genre">Genre: Electronic</p>

  <audio id="player" controls autoplay>
    <source src="https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one" type="audio/mpeg">
  </audio>

  <hr>

  <h2>🎶 Music Library</h2>

  <button onclick="playTrack('AI Artist - Future Sound', 'Electronic', 'AI Artist')">
    Future Sound
  </button>

  <button onclick="playTrack('NeuroBeats - Digital Dreams', 'Hip-Hop', 'NeuroBeats')">
    Digital Dreams
  </button>

  <button onclick="playTrack('EchoSynth - Night Pulse', 'Synthwave', 'EchoSynth')">
    Night Pulse
  </button>

  <hr>

  <div id="plays"></div>

  <hr>

  <h2>🏆 Royalty Dashboard</h2>
  <div id="topTrack"></div>
  <div id="topArtist"></div>

  <hr>

  <h2>🎖 AI Music Awards</h2>
  <button onclick="generateAwards()">Generate Awards</button>

  <div id="awards"></div>

  <script>
    let playCounts = {};
    let artistCounts = {};

    function playTrack(name, genre, artist) {
      document.getElementById("track").innerText = name;
      document.getElementById("genre").innerText = "Genre: " + genre;

      if (!playCounts[name]) playCounts[name] = 0;
      playCounts[name]++;

      if (!artistCounts[artist]) artistCounts[artist] = 0;
      artistCounts[artist]++;

      updatePlays();
      updateTopStats();

      document.getElementById("player").load();
      document.getElementById("player").play();
    }

    function updatePlays() {
      let output = "<h3>📊 Play Counts</h3><ul>";
      for (let track in playCounts) {
        output += "<li>" + track + ": " + playCounts[track] + " plays</li>";
      }
      output += "</ul>";
      document.getElementById("plays").innerHTML = output;
    }

    function updateTopStats() {
      let topTrack = "";
      let maxTrack = 0;

      for (let t in playCounts) {
        if (playCounts[t] > maxTrack) {
          maxTrack = playCounts[t];
          topTrack = t;
        }
      }

      let topArtist = "";
      let maxArtist = 0;

      for (let a in artistCounts) {
        if (artistCounts[a] > maxArtist) {
          maxArtist = artistCounts[a];
          topArtist = a;
        }
      }

      document.getElementById("topTrack").innerHTML =
        "<strong>Top Track:</strong> " + topTrack + " (" + maxTrack + " plays)";

      document.getElementById("topArtist").innerHTML =
        "<strong>Top Artist:</strong> " + topArtist + " (" + maxArtist + " plays)";
    }

    function generateAwards() {
      let topTrack = "";
      let maxTrack = 0;

      for (let t in playCounts) {
        if (playCounts[t] > maxTrack) {
          maxTrack = playCounts[t];
          topTrack = t;
        }
      }

      let topArtist = "";
      let maxArtist = 0;

      for (let a in artistCounts) {
        if (artistCounts[a] > maxArtist) {
          maxArtist = artistCounts[a];
          topArtist = a;
        }
      }

      let result = "<h3>🏆 Award Winners</h3>";

      result += "<p><strong>Top Track of the Year:</strong> " + topTrack + "</p>";
      result += "<p><strong>Top Artist of the Year:</strong> " + topArtist + "</p>";

      document.getElementById("awards").innerHTML = result;
    }
  </script>

</body>
</html>
