<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WH2 Radio</title>

<style>

body{
background:black;
color:white;
font-family:Arial, sans-serif;
margin:0;
padding:0;
text-align:center;
}

.header{
padding:30px;
background:#111;
border-bottom:2px solid red;
}

.header h1{
font-size:50px;
color:red;
margin:0;
}

.header p{
color:#ccc;
font-size:18px;
}

.player{
margin-top:40px;
padding:20px;
}

.album-art{
width:250px;
height:250px;
border-radius:20px;
object-fit:cover;
border:4px solid red;
}

.song-title{
font-size:30px;
margin-top:20px;
}

.artist{
font-size:20px;
color:#999;
}

audio{
margin-top:20px;
width:80%;
}

.footer{
margin-top:50px;
padding:20px;
background:#111;
color:#666;
}

</style>
</head>

<body>

<div class="header">
<h1>WH2 RADIO</h1>

</div>

<div class="player">

<img class="album-art" src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1000" />

<div class="song-title">
Midnight Vibes
</div>

<div class="artist">
WH2 Artist
</div>

<audio controls>
<source src="rockot-experimental-cinematic-hip-hop-315904.mp3" type="audio/mpeg">

</div>

<div class="footer">
WH2 Radio © 2026

</html>
